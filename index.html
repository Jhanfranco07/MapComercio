<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa de Ambulantes - Pachacamac</title>
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="hero fade-in main-hero">
    <div class="theme">
      <button id="themeToggle" class="btn icon-only" type="button" aria-label="Cambiar tema">
        <span id="themeIcon" aria-hidden="true">🌙</span>
      </button>
    </div>

    <div class="hero-copy">
      <h1>COMERCIO AMBULATORIO EN PACHACÁMAC</h1>
    </div>
  </header>

  <main class="main-app">
    <section id="mainFilters" class="controls main-controls fade-in" style="animation-delay: .05s">
      <div class="group">
        <label for="giroFilter">Rubro</label>
        <select id="giroFilter">
          <option value="todos">Todos</option>
        </select>
      </div>

      <div class="group">
        <label for="turnoFilter">Turno</label>
        <select id="turnoFilter">
          <option value="todos">Todos</option>
          <option value="manana">Manana</option>
          <option value="tarde">Tarde</option>
        </select>
      </div>

      <div class="group grow">
        <label for="searchInput">Buscar</label>
        <input id="searchInput" class="search" type="search" placeholder="Nombre, productos, zona..." />
      </div>
    </section>

    <section class="stats" aria-label="Resumen">
      <span class="chip">Total: <strong id="totalCount">0</strong></span>
      <span class="chip">Mostrando: <strong id="visibleCount">0</strong></span>
      <span class="chip">Zonas activas: <strong id="activeZones">0</strong></span>
      <span class="chip">Sin ubicacion: <strong id="missingCount">0</strong></span>
    </section>

    <section id="map" class="fade-in main-map" style="animation-delay: .08s" aria-label="Mapa interactivo"></section>

    <section class="controls editor main-editor">
      <div class="group grow">
        <label for="personSelect">Editor de ubicaciones</label>
        <select id="personSelect">
          <option value="">Selecciona una persona...</option>
        </select>
      </div>

      <div class="group action-group">
        <button id="btnAssign" class="btn primary" type="button">Asignar en el mapa</button>
        <button id="btnCenter" class="btn" type="button">Centrar</button>
        <button id="btnClear" class="btn" type="button">Quitar ubicacion</button>
      </div>

      <p id="coordPreview" class="coord" aria-live="polite">Lat: -, Lng: -</p>
    </section>

    <div class="map-fabs" aria-label="Acciones rapidas">
      <button class="fab mobile-filter-toggle" id="btnFilters" type="button" aria-expanded="false" aria-controls="mainFilters">Filtros</button>
      <button class="fab" id="btnReset" type="button">Reset filtros</button>
      <button class="fab" id="btnLoc" type="button">Mi ubicacion</button>
    </div>

    <section class="legend-dock">
      <div class="legend-block wide-block">
        <h2>Leyenda por Rubro</h2>
        <div id="legendGiros" class="legend-items"></div>
      </div>

      <div class="legend-block">
        <h2>Leyenda por Turno</h2>
        <div class="legend-items">
          <div class="legend-item static"><span class="legend-ring manana"></span> Manana</div>
          <div class="legend-item static"><span class="legend-ring tarde"></span> Tarde</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="export" id="exportBar">
    <label class="checkbox-inline" for="onlyVisible">
      <input type="checkbox" id="onlyVisible" />
      Exportar solo visibles
    </label>

    <button id="btnKml" class="btn" type="button">Descargar KML</button>
    <button id="btnKmz" class="btn primary" type="button">Descargar KMZ</button>
    <button id="btnXlsx" class="btn" type="button">Dataset XLSX</button>
    <button id="btnCsv" class="btn" type="button">Dataset CSV</button>
    <span class="note-inline">Para Google Earth usa KMZ. Para editar datos usa XLSX o CSV.</span>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite">Cargando datos...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
  <script>window.addEventListener("DOMContentLoaded", initMap);</script>
</body>
</html>
