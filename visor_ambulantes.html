<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comercio Ambulatorio en Pachacámac</title>
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="hero fade-in viewer-hero">
    <div class="theme">
      <button id="themeToggle" class="btn icon-only" type="button" aria-label="Cambiar tema">
        <span id="themeIcon" aria-hidden="true">🌙</span>
      </button>
    </div>

    <div class="hero-copy">
      <h1>COMERCIO AMBULATORIO EN PACHACÁMAC</h1>
    </div>
  </header>

  <main class="viewer-main">
    <section id="viewerFilters" class="controls viewer-controls fade-in" style="animation-delay: .05s">
      <div class="group compact-group">
        <label for="giroFilter">Rubro</label>
        <select id="giroFilter">
          <option value="todos">Todos</option>
        </select>
      </div>

      <div class="group compact-group">
        <label for="turnoFilter">Turno</label>
        <select id="turnoFilter">
          <option value="todos">Todos</option>
          <option value="manana">Mañana</option>
          <option value="tarde">Tarde</option>
        </select>
      </div>

      <div class="group grow">
        <label for="searchInput">Buscar</label>
        <input id="searchInput" class="search" type="search" placeholder="Nombre, productos, zona..." />
      </div>
    </section>

    <section class="stats viewer-stats" aria-label="Resumen">
      <span class="chip">Total: <strong id="totalCount">0</strong></span>
      <span class="chip">Mostrando: <strong id="visibleCount">0</strong></span>
      <span class="chip">Zonas activas: <strong id="activeZones">0</strong></span>
    </section>

    <section id="map" class="fade-in viewer-map" style="animation-delay: .08s" aria-label="Mapa interactivo"></section>

    <div class="map-fabs viewer-fabs" aria-label="Acciones rapidas">
      <button class="fab mobile-filter-toggle" id="btnFilters" type="button" aria-expanded="false" aria-controls="viewerFilters">Filtros</button>
      <button class="fab" id="btnReset" type="button">Reset filtros</button>
      <button class="fab" id="btnLoc" type="button">Mi ubicación</button>
    </div>

    <section class="legend-dock viewer-legend">
      <div class="legend-block wide-block">
        <h2>Leyenda por Rubro</h2>
        <div id="legendGiros" class="legend-items"></div>
      </div>

      <div class="legend-block">
        <h2>Leyenda por Turno</h2>
        <div class="legend-items">
          <div class="legend-item static"><span class="legend-ring manana"></span> Mañana</div>
          <div class="legend-item static"><span class="legend-ring tarde"></span> Tarde</div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Cargando datos...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="visor.js"></script>
  <script>window.addEventListener("DOMContentLoaded", initMap);</script>
</body>
</html>
