<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Comercio Ambulatorio en Pachacámac</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="hero fade-in viewer-hero app-topbar">
    <div class="brand-lockup">
      <span class="material-symbols-outlined brand-icon" aria-hidden="true">account_balance</span>
      <div>
        <h1>Municipalidad de Pachacámac</h1>
        <p>Comercio Ambulatorio Autorizado</p>
      </div>
    </div>
    <div class="theme">
      <button id="themeToggle" class="btn icon-only" type="button" aria-label="Cambiar tema">
        <span id="themeIcon" class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
      </button>
    </div>
  </header>

  <main class="viewer-main">
    <section id="viewerFilters" class="controls viewer-controls fade-in" style="animation-delay: .05s">
      <div class="group compact-group">
        <label for="giroFilter"><span class="material-symbols-outlined" aria-hidden="true">category</span> Rubro</label>
        <select id="giroFilter">
          <option value="todos">Todos</option>
        </select>
      </div>

      <div class="group compact-group">
        <label for="turnoFilter"><span class="material-symbols-outlined" aria-hidden="true">schedule</span> Turno</label>
        <select id="turnoFilter">
          <option value="todos">Todos</option>
          <option value="manana">Mañana</option>
          <option value="tarde">Tarde</option>
        </select>
      </div>

      <fieldset class="group compact-group map-mode-group">
        <legend><span class="material-symbols-outlined" aria-hidden="true">layers</span> Vista</legend>
        <div class="segmented-control" role="radiogroup" aria-label="Modo del mapa">
          <label>
            <input type="radio" name="mapMode" value="vigentes" checked />
            <span>Vigentes</span>
          </label>
          <label>
            <input type="radio" name="mapMode" value="historico" />
            <span>Histórico</span>
          </label>
        </div>
      </fieldset>

      <div class="group grow">
        <label for="searchInput"><span class="material-symbols-outlined" aria-hidden="true">search</span> Buscar</label>
        <input id="searchInput" class="search" type="search" placeholder="Nombre, productos, zona..." />
      </div>
    </section>

    <section id="searchModule" class="search-module" aria-label="Buscar comerciantes">
      <div class="search-shell">
        <label class="search-box" for="moduleSearchInput">
          <span class="material-symbols-outlined" aria-hidden="true">search</span>
          <input id="moduleSearchInput" type="search" placeholder="Buscar por nombre, DNI, permiso o estado" />
        </label>
        <div class="quick-filters" aria-label="Filtros rapidos">
          <button type="button" data-query="">Todos</button>
          <button type="button" data-query="vigente">Vigentes</button>
          <button type="button" data-query="vencido">Vencidos</button>
          <button type="button" data-query="sándwiches">Sándwiches</button>
          <button type="button" data-query="bebidas saludables">Bebidas</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>
    </section>

    <section class="stats viewer-stats" aria-label="Resumen">
      <span class="chip"><span class="material-symbols-outlined" aria-hidden="true">storefront</span>Total <strong id="totalCount">0</strong></span>
      <span class="chip good"><span class="material-symbols-outlined" aria-hidden="true">verified</span>Mostrando <strong id="visibleCount">0</strong></span>
      <span class="chip"><span class="material-symbols-outlined" aria-hidden="true">location_on</span>Zonas <strong id="activeZones">0</strong></span>
      <span class="chip"><span class="material-symbols-outlined" aria-hidden="true">history</span>Históricas <strong id="historyCount">0</strong></span>
    </section>

    <section id="map" class="fade-in viewer-map" style="animation-delay: .08s" aria-label="Mapa interactivo"></section>

    <div class="map-fabs viewer-fabs" aria-label="Acciones rapidas">
      <button class="fab mobile-filter-toggle" id="btnFilters" type="button" aria-expanded="false" aria-controls="viewerFilters"><span class="material-symbols-outlined" aria-hidden="true">tune</span> Filtros</button>
      <button class="fab mobile-map-pan-toggle" id="btnMapPan" type="button" aria-pressed="false"><span class="material-symbols-outlined" aria-hidden="true">open_with</span> Mover mapa</button>
      <button class="fab" id="btnReset" type="button"><span class="material-symbols-outlined" aria-hidden="true">restart_alt</span> Reiniciar</button>
      <button class="fab" id="btnLoc" type="button"><span class="material-symbols-outlined" aria-hidden="true">near_me</span> Mi ubicación</button>
    </div>

    <section class="legend-dock viewer-legend">
      <div class="legend-block wide-block">
        <h2>Leyenda por Rubro</h2>
        <div id="legendGiros" class="legend-items"></div>
      </div>

      <div class="legend-block">
        <h2>Leyenda por Turno</h2>
        <div class="legend-items">
          <div class="legend-item static"><span class="legend-ring manana"></span> Mañana</div>
          <div class="legend-item static"><span class="legend-ring tarde"></span> Tarde</div>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Cargando datos...</div>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <button class="bottom-nav-item active" type="button" id="bottomMap"><span class="material-symbols-outlined" aria-hidden="true">map</span><span>Mapa</span></button>
    <button class="bottom-nav-item" type="button" id="bottomSearch"><span class="material-symbols-outlined" aria-hidden="true">search</span><span>Buscar</span></button>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="data-source.js"></script>
  <script src="visor.js"></script>
  <script>window.addEventListener("DOMContentLoaded", initMap);</script>
</body>
</html>
