<script>
        // Simple Micro-interaction for filter chips
        const chips = document.querySelectorAll('button[class*="rounded-full"]');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => c.classList.remove('bg-primary', 'text-on-primary'));
                chip.classList.add('bg-primary', 'text-on-primary');
            });
        });
